name: EAS Build (Android)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'mobile/native/third_party/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - development

jobs:
  build-native-libs:
    name: Build Native Libraries (QPDF + MuPDF)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/25.2.9519653
          key: android-ndk-r25b

      - name: Cache native .so files
        id: cache-so
        uses: actions/cache@v4
        with:
          path: mobile/native/third_party
          key: native-libs-${{ hashFiles('mobile/native/src/**', 'mobile/native/CMakeLists.txt') }}

      - name: Install build tools
        if: steps.cache-so.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build build-essential pkg-config unzip git

      - name: Download Android NDK r25b
        if: steps.cache-ndk.outputs.cache-hit != 'true' && steps.cache-so.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/Android/Sdk/ndk
          curl -L -o /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          unzip -q /tmp/ndk.zip -d ~/Android/Sdk/ndk
          mv ~/Android/Sdk/ndk/android-ndk-r25b ~/Android/Sdk/ndk/25.2.9519653
          rm /tmp/ndk.zip
          echo "NDK downloaded."

      - name: Build QPDF + MuPDF .so files
        if: steps.cache-so.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: /home/runner/Android/Sdk/ndk/25.2.9519653
        run: bash scripts/build_native_libraries.sh

      - name: Show built .so files
        run: find mobile/native/third_party -name '*.so' -print 2>/dev/null || echo "No .so files found (cache may be used)"

      - name: Commit .so files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/native/third_party/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit — .so files already up to date."
          else
            git commit -m "chore: update prebuilt native .so libraries [skip ci]"
            git push
          fi

  eas-build:
    name: EAS Build Android APK
    needs: build-native-libs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with latest .so files)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mobile/package.json

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: mobile

      - name: Verify EAS login
        working-directory: mobile
        run: eas whoami

      - name: Build Android APK via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
